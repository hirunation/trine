# ── TrineDB Docker Compose ───────────────────────────────────────────
# Start:   docker compose -f deploy/docker/docker-compose.yml up -d
# Stop:    docker compose -f deploy/docker/docker-compose.yml down
# Logs:    docker compose -f deploy/docker/docker-compose.yml logs -f
#
# Run from the project root directory (build context = project root).
# ─────────────────────────────────────────────────────────────────────
version: "3.8"

services:
  trinedb:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "7319:7319"
    volumes:
      - trine_data:/data
    # TrineDB reads configuration from command-line arguments, not
    # environment variables.  Override the default CMD here to change
    # threshold, recall mode, lens, or port.
    command: ["-p", "7319", "-d", "/data", "-t", "0.60", "--recall", "balanced"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7319/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  trine_data:
